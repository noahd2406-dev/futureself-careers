<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FutureSelf — Careers</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --navy: #2C3E50;
      --navy-dark: #1A252F;
      --navy-mid: #34495e;
      --bg: #F0F2F5;
      --surface: #FFFFFF;
      --border: #D5DAE0;
      --text-primary: #2C3E50;
      --text-secondary: #5D6D7E;
      --accent-light: #E8ECF0;
      --tag-bg: #EEF1F4;
      --shadow: 0 2px 12px rgba(44,62,80,0.08);
      --shadow-hover: 0 8px 32px rgba(44,62,80,0.18);
      --radius: 14px;
      --radius-sm: 9px;
    }
    body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; }

    
    /* ── HERO ── */
    .hero {
      background: linear-gradient(140deg, var(--navy) 0%, var(--navy-mid) 100%);
      padding: 36px 36px 32px; color: #fff;
    }
    .hero h1 { font-family: 'Fraunces', serif; font-size: 30px; font-weight: 700; letter-spacing: -0.5px; margin-bottom: 5px; }
    .hero p { font-size: 14px; color: rgba(255,255,255,0.65); margin-bottom: 22px; }
    .search-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .search-input-wrap { position: relative; flex: 1; min-width: 200px; }
    .location-input-wrap { position: relative; min-width: 160px; }
    .input-icon { position: absolute; left: 13px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: 0.5; }
    .search-row input[type="text"] {
      width: 100%; padding: 11px 14px 11px 40px;
      border: 1.5px solid rgba(255,255,255,0.2);
      border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
      background: rgba(255,255,255,0.12); color: #fff;
      transition: border-color 0.2s, background 0.2s; outline: none;
    }
    .search-row input[type="text"]:focus { border-color: rgba(255,255,255,0.55); background: rgba(255,255,255,0.18); }
    .search-row input[type="text"]::placeholder { color: rgba(255,255,255,0.4); }
    .btn-search {
      padding: 11px 26px; background: #fff; color: var(--navy); border: none;
      border-radius: var(--radius-sm); font-family: inherit; font-size: 14px;
      font-weight: 700; cursor: pointer; transition: background 0.2s; white-space: nowrap;
    }
    .btn-search:hover { background: #dce3ea; }

    /* ── FILTER ROWS ── */
    .city-row {
      background: var(--surface); border-bottom: 1.5px solid var(--border);
      padding: 10px 36px; display: flex; align-items: center; gap: 7px;
      overflow-x: auto; white-space: nowrap;
    }
    .city-row::-webkit-scrollbar { height: 0; }
    .city-chip {
      padding: 5px 12px; border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface); font-family: inherit; font-size: 12px;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-weight: 500;
      white-space: nowrap; flex-shrink: 0;
    }
    .city-chip:hover { border-color: var(--navy); color: var(--navy); background: var(--accent-light); }
    .city-chip.active { background: var(--navy); border-color: var(--navy); color: #fff; }

    /* ── CONTAINER ── */
    .container { max-width: 1100px; margin: 0 auto; padding: 28px 24px 80px; }
    .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; gap: 12px; }
    .results-count { font-size: 13px; color: var(--text-secondary); }
    .results-count strong { color: var(--text-primary); }
    .view-toggle { display: flex; border: 1.5px solid var(--border); border-radius: var(--radius-sm); overflow: hidden; }
    .view-btn {
      padding: 6px 14px; background: var(--surface); border: none;
      font-family: inherit; font-size: 13px; font-weight: 500;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
      display: flex; align-items: center; gap: 5px;
    }
    .view-btn + .view-btn { border-left: 1px solid var(--border); }
    .view-btn.active { background: var(--navy); color: #fff; }
    .view-btn:hover:not(.active) { background: var(--accent-light); }

    /* ── JOB CARDS ── */
    .jobs-grid { display: flex; flex-direction: column; gap: 12px; }
    .job-card {
      background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius);
      padding: 18px 20px; display: flex; gap: 16px; align-items: flex-start;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.15s;
      animation: fadeUp 0.3s ease both; box-shadow: var(--shadow);
    }
    .job-card:hover { box-shadow: var(--shadow-hover); border-color: #b0bec5; transform: translateY(-2px); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    .job-logo {
      width: 46px; height: 46px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Fraunces', serif; font-size: 18px; font-weight: 700;
      color: #fff; flex-shrink: 0; overflow: hidden;
    }
    .job-body { flex: 1; min-width: 0; }
    .job-title { font-size: 15px; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; line-height: 1.3; }
    .job-company { font-size: 13px; color: var(--text-secondary); margin-bottom: 9px; }
    .job-tags { display: flex; gap: 5px; flex-wrap: wrap; margin-bottom: 9px; }
    .tag { padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; letter-spacing: 0.2px; }
    .tag.default { background: var(--tag-bg); color: var(--text-secondary); }
    .tag.remote { background: #E3F2FD; color: #1565C0; }
    .tag.new { background: #FFF3E0; color: #B85C00; }
    .tag.salary { background: #E8F5E9; color: #2E7D32; }
    .job-desc { font-size: 13px; color: var(--text-secondary); line-height: 1.6; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .job-desc.expanded { display: block !important; overflow: visible !important; }
    .btn-expand { background: none; border: none; font-family: inherit; font-size: 12px; color: var(--navy); cursor: pointer; padding: 4px 0; font-weight: 600; margin-top: 4px; display: inline-block; }
    .btn-expand:hover { text-decoration: underline; }
    .job-actions { display: flex; flex-direction: column; align-items: flex-end; gap: 8px; flex-shrink: 0; }
    .job-posted { font-size: 11px; color: #ADADAD; white-space: nowrap; }
    .btn-apply {
      padding: 8px 16px; background: var(--navy); color: #fff; border: none;
      border-radius: var(--radius-sm); font-family: inherit; font-size: 13px;
      font-weight: 600; cursor: pointer; transition: background 0.2s;
      text-decoration: none; display: inline-block; white-space: nowrap;
    }
    .btn-apply:hover { background: var(--navy-dark); }



    /* ── STATES ── */
    .loading-state { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 60px 20px; gap: 14px; }
    .spinner { width: 34px; height: 34px; border: 3px solid var(--border); border-top-color: var(--navy); border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
    .empty-state p { font-size: 15px; margin-bottom: 6px; }
    .empty-state small { font-size: 13px; }

    /* ── PAGINATION ── */
    .pagination { display: flex; align-items: center; justify-content: center; gap: 7px; margin-top: 32px; flex-wrap: wrap; }
    .btn-page {
      padding: 7px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      background: var(--surface); font-family: inherit; font-size: 13px;
      font-weight: 500; color: var(--text-secondary); cursor: pointer; transition: all 0.15s;
    }
    .btn-page:hover:not(:disabled) { border-color: var(--navy); color: var(--navy); }
    .btn-page:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-page.active { background: var(--navy); border-color: var(--navy); color: #fff; }

    /* ── BOOKMARK ── */
    .btn-bookmark {
      background: none; border: none; cursor: pointer; padding: 4px;
      font-size: 18px; line-height: 1; transition: all 0.15s;
      flex-shrink: 0; opacity: 0.4;
    }
    .btn-bookmark:hover { opacity: 0.7; }
    .btn-bookmark.saved { opacity: 1; }
    .saved-count { font-size: 12px; color: var(--text-secondary); margin-left: auto; }
    .saved-banner {
      background: var(--surface); border-bottom: 1.5px solid var(--border);
      padding: 8px 36px; display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-secondary);
    }
    .saved-banner button {
      background: none; border: none; font-family: inherit; font-size: 13px;
      color: var(--navy); font-weight: 600; cursor: pointer; text-decoration: underline;
    }

    /* ── SORT ── */
    .sort-select {
      padding: 5px 10px; border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-family: inherit; font-size: 12px; color: var(--text-secondary);
      background: var(--surface); cursor: pointer; outline: none;
    }
    .sort-select:focus { border-color: var(--navy); }

    /* ── GLASSDOOR ── */
    .tag.glassdoor { background: #E8F5E9; color: #1B5E20; }

    /* ── SALARY + DATE FILTERS ── */
    .filters-row {
      background: var(--surface); border-bottom: 1.5px solid var(--border);
      padding: 12px 36px; display: flex; align-items: center; gap: 24px; flex-wrap: wrap;
    }
    .filter-group { display: flex; align-items: center; gap: 10px; }
    .filter-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }
    .salary-slider {
      -webkit-appearance: none; appearance: none;
      width: 160px; height: 4px; border-radius: 2px;
      background: linear-gradient(to right, var(--navy) 0%, var(--navy) var(--pct, 0%), var(--border) var(--pct, 0%), var(--border) 100%);
      outline: none; cursor: pointer;
    }
    .salary-slider::-webkit-slider-thumb {
      -webkit-appearance: none; width: 16px; height: 16px;
      border-radius: 50%; background: var(--navy); cursor: pointer;
      border: 2px solid #fff; box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .salary-value { font-size: 12px; font-weight: 600; color: var(--navy); min-width: 48px; }
    .date-chip {
      padding: 5px 12px; border-radius: 999px;
      border: 1.5px solid var(--border);
      background: var(--surface); font-family: inherit; font-size: 12px;
      color: var(--text-secondary); cursor: pointer; transition: all 0.15s; font-weight: 500;
    }
    .date-chip:hover { border-color: var(--navy); color: var(--navy); }
    .date-chip.active { background: var(--navy); border-color: var(--navy); color: #fff; }

    @media (max-width: 620px) {
      .header, .hero { padding-left: 18px; padding-right: 18px; }
      .container { padding: 20px 14px 60px; }
      .hero h1 { font-size: 24px; }
      .job-card { flex-wrap: wrap; }
      .job-actions { flex-direction: row; align-items: center; width: 100%; justify-content: space-between; }
    }
  </style>
</head>
<body>


<!-- HERO -->
<div class="hero">
  <h1>Find Your Career</h1>
  <p>Explore entry-level opportunities matched to where you're headed.</p>
  <div class="search-row">
    <div class="search-input-wrap">
      <svg class="input-icon" width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="keywordInput" placeholder="Role, company, or skill…" />
    </div>
    <div class="location-input-wrap">
      <svg class="input-icon" width="15" height="15" fill="none" viewBox="0 0 24 24" stroke="white" stroke-width="2">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/>
      </svg>
      <input type="text" id="locationInput" placeholder="Location" />
    </div>
    <button class="btn-search" onclick="runSearch()">Search</button>
  </div>
</div>

<!-- CITY ROW -->
<div class="city-row">
  <button class="city-chip active" data-city="" onclick="toggleCity(this)">All</button>
  <button class="city-chip" data-city="New York" onclick="toggleCity(this)">New York</button>
  <button class="city-chip" data-city="Los Angeles" onclick="toggleCity(this)">Los Angeles</button>
  <button class="city-chip" data-city="Chicago" onclick="toggleCity(this)">Chicago</button>
  <button class="city-chip" data-city="Houston" onclick="toggleCity(this)">Houston</button>
  <button class="city-chip" data-city="San Francisco" onclick="toggleCity(this)">San Francisco</button>
  <button class="city-chip" data-city="Seattle" onclick="toggleCity(this)">Seattle</button>
  <button class="city-chip" data-city="Boston" onclick="toggleCity(this)">Boston</button>
  <button class="city-chip" data-city="Austin" onclick="toggleCity(this)">Austin</button>
  <button class="city-chip" data-city="Washington DC" onclick="toggleCity(this)">Washington DC</button>
  <button class="city-chip" data-city="Atlanta" onclick="toggleCity(this)">Atlanta</button>
  <button class="city-chip" data-city="Denver" onclick="toggleCity(this)">Denver</button>
  <button class="city-chip" data-city="Dallas" onclick="toggleCity(this)">Dallas</button>
  <button class="city-chip" data-city="Miami" onclick="toggleCity(this)">Miami</button>
  <button class="city-chip" data-city="Nashville" onclick="toggleCity(this)">Nashville</button>
  <button class="city-chip" data-city="Philadelphia" onclick="toggleCity(this)">Philadelphia</button>
  <button class="city-chip" data-city="Minneapolis" onclick="toggleCity(this)">Minneapolis</button>
  <button class="city-chip" data-city="Charlotte" onclick="toggleCity(this)">Charlotte</button>
  <button class="city-chip" data-city="Detroit" onclick="toggleCity(this)">Detroit</button>
</div>

<!-- CAREER ROW -->
<div class="city-row">
  <button class="city-chip career-chip active" data-type="all" onclick="toggleCareerChip(this)">All</button>
  <button class="city-chip career-chip" data-type="technology" onclick="toggleCareerChip(this)">Technology</button>
  <button class="city-chip career-chip" data-type="finance" onclick="toggleCareerChip(this)">Finance</button>
  <button class="city-chip career-chip" data-type="consulting" onclick="toggleCareerChip(this)">Consulting</button>
  <button class="city-chip career-chip" data-type="marketing" onclick="toggleCareerChip(this)">Marketing</button>
  <button class="city-chip career-chip" data-type="engineering" onclick="toggleCareerChip(this)">Engineering</button>
  <button class="city-chip career-chip" data-type="legal" onclick="toggleCareerChip(this)">Legal</button>
  <button class="city-chip career-chip" data-type="healthcare" onclick="toggleCareerChip(this)">Healthcare</button>
  <button class="city-chip career-chip" data-type="government" onclick="toggleCareerChip(this)">Government</button>
  <button class="city-chip career-chip" data-type="accounting" onclick="toggleCareerChip(this)">Accounting</button>
  <button class="city-chip career-chip" data-type="business" onclick="toggleCareerChip(this)">Business</button>
  <button class="city-chip career-chip" data-type="hr" onclick="toggleCareerChip(this)">Human Resources</button>
  <button class="city-chip career-chip" data-type="remote" onclick="toggleCareerChip(this)">Remote</button>
</div>

<!-- SALARY + DATE FILTERS -->
<div class="filters-row">
  <div class="filter-group">
    <span class="filter-label">Min Salary</span>
    <input type="range" class="salary-slider" id="salarySlider" min="0" max="150000" step="5000" value="0"
      oninput="updateSalaryDisplay(this.value)" onchange="runSearch(1)" />
    <span class="salary-value" id="salaryDisplay">Any</span>
  </div>
  <div class="filter-group">
    <span class="filter-label">Posted</span>
    <button class="date-chip active" data-days="30" onclick="toggleDateChip(this)">Last 30d</button>
    <button class="date-chip" data-days="14" onclick="toggleDateChip(this)">Last 14d</button>
    <button class="date-chip" data-days="7" onclick="toggleDateChip(this)">Last 7d</button>
    <button class="date-chip" data-days="1" onclick="toggleDateChip(this)">Today</button>
  </div>
</div>

<!-- MAIN -->
<div class="container">
  <div class="top-bar">
    <div class="results-meta" id="resultsMeta" style="display:none">
      <div class="results-count" id="resultsCount"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px;flex-shrink:0;">
      <select class="sort-select" id="sortSelect" onchange="runSearch(1)">
        <option value="date">Latest</option>
        <option value="salary_desc">Salary: High to Low</option>
        <option value="salary_asc">Salary: Low to High</option>
      </select>
      <button class="date-chip" id="savedToggle" onclick="toggleSavedView()" style="flex-shrink:0;">☆ Saved (<span id="savedCount">0</span>)</button>
    </div>
  </div>

  <div id="listView">
    <div id="jobsContainer">
      <div class="loading-state">
        <div class="spinner"></div>
        <div class="loading-text">Loading careers…</div>
      </div>
    </div>
    <div class="pagination" id="pagination" style="display:none"></div>
  </div>

</div>

<script>
  const WORKER_URL = 'https://futureselfcareers.noahd2406.workers.dev';
  const PER_PAGE   = 50;

  const CATEGORY_KEYWORDS = {
    all:         'entry level OR analyst OR associate',
    technology:  'entry level technology OR technology analyst OR technology associate',
    finance:     'entry level finance OR finance analyst OR finance associate',
    consulting:  'entry level consulting OR consulting analyst OR consulting associate',
    marketing:   'entry level marketing OR marketing analyst OR marketing associate',
    engineering: 'entry level engineering OR engineering analyst OR engineering associate',
    legal:       'entry level legal OR legal analyst OR legal associate',
    healthcare:  'entry level healthcare OR healthcare analyst OR healthcare associate',
    government:  'entry level government OR government analyst OR government associate',
    accounting:  'entry level accounting OR accounting analyst OR accounting associate',
    business:    'entry level business OR business analyst OR business associate',
    hr:          'entry level human resources OR HR analyst OR HR associate',
    remote:      'entry level remote OR remote analyst OR remote associate',
  };

  

  let currentPage    = 1;
  let minSalary      = 0;
  let maxDaysOld     = 60;
  let showingSaved   = false;
  let savedJobs      = JSON.parse(localStorage.getItem('fs_saved_jobs') || '{}');
  const jobCache     = {};

  function updateSavedCount() {
    const count = Object.keys(savedJobs).length;
    document.getElementById('savedCount').textContent = count;
  }

  function toggleSave(id) {
    const job = jobCache[id];
    if (savedJobs[id]) {
      delete savedJobs[id];
    } else if (job) {
      savedJobs[id] = job;
    }
    localStorage.setItem('fs_saved_jobs', JSON.stringify(savedJobs));
    updateSavedCount();
    const btn = document.querySelector(`[data-jobid="${id}"]`);
    if (btn) {
      const isSaved = !!savedJobs[id];
      btn.classList.toggle('saved', isSaved);
      btn.innerHTML = isSaved ? '★' : '☆';
    }
  }

  function toggleSavedView() {
    showingSaved = !showingSaved;
    const btn = document.getElementById('savedToggle');
    if (showingSaved) {
      btn.classList.add('active');
      const jobs = Object.values(savedJobs);
      if (jobs.length === 0) {
        document.getElementById('jobsContainer').innerHTML = '<div class="empty-state"><p>No saved jobs yet.</p><small>Click the ⭐ on any listing to save it.</small></div>';
        document.getElementById('resultsMeta').style.display = 'none';
        document.getElementById('pagination').style.display = 'none';
      } else {
        document.getElementById('resultsMeta').style.display = 'block';
        document.getElementById('resultsCount').innerHTML = `<strong>${jobs.length}</strong> saved jobs`;
        const container = document.getElementById('jobsContainer');
        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'jobs-grid';
        jobs.forEach((job, i) => grid.appendChild(buildCard(job, i)));
        container.appendChild(grid);
        document.getElementById('pagination').style.display = 'none';
      }
    } else {
      btn.classList.remove('active');
      runSearch(1);
    }
  }
  let totalResults   = 0;
  let totalPages     = 1;
  let activeCategory = 'all';
  let activeCity     = '';
  

  function toggleCity(el) {
    document.querySelectorAll('.city-chip:not(.career-chip)').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeCity = el.dataset.city;
    runSearch(1);
  }

  function updateSalaryDisplay(val) {
    const num = parseInt(val);
    const pct = (num / 150000) * 100;
    document.getElementById('salarySlider').style.setProperty('--pct', pct + '%');
    document.getElementById('salaryDisplay').textContent = num === 0 ? 'Any' : `$${num/1000}k+`;
    minSalary = num;
  }

  function toggleDateChip(el) {
    document.querySelectorAll('.date-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    maxDaysOld = parseInt(el.dataset.days);
    runSearch(1);
  }

  function toggleCareerChip(el) {
    document.querySelectorAll('.career-chip').forEach(c => c.classList.remove('active'));
    el.classList.add('active');
    activeCategory = el.dataset.type;
    runSearch(1);
  }

  function buildQuery(keyword) {
    const base = CATEGORY_KEYWORDS[activeCategory] || 'entry level';
    return keyword ? `${keyword} entry level ${base}` : base;
  }



  function runSearch(page = 1) {
    currentPage = page;
    const keyword  = document.getElementById('keywordInput').value.trim();
    const location = document.getElementById('locationInput').value.trim() || activeCity;
    fetchJobs(buildQuery(keyword), location, page);
  }

  async function fetchJobs(query, location, page) {
    showLoading();
    const sortVal = document.getElementById('sortSelect')?.value || 'date';
    const params = new URLSearchParams({ page, what: query, sort_by: sortVal === 'date' ? 'date' : 'salary' });
    if (location) params.append('where', location);
    if (minSalary > 0) params.append('min_salary', minSalary);
    const url = `${WORKER_URL}/?${params}`;
    try {
      const res  = await fetch(url);
      if (!res.ok) throw new Error(`API error ${res.status}`);
      const data = await res.json();
      lastJobs = data.results || [];
      renderJobs(data, page);
    } catch (err) {
      showError(err.message);
    }
  }

  function renderJobs(data, page) {
    const container = document.getElementById('jobsContainer');
    const meta      = document.getElementById('resultsMeta');
    const countEl   = document.getElementById('resultsCount');
    const jobs      = data.results || [];

    // Filter by salary only
    const filtered = jobs.filter(job => {
      if (minSalary > 0 && (!job.salary_min || job.salary_min < minSalary)) return false;
      return true;
    });

    // Sort client-side
    const sortVal = document.getElementById('sortSelect')?.value || 'date';
    if (sortVal === 'salary_desc') filtered.sort((a, b) => (b.salary_max || 0) - (a.salary_max || 0));
    else if (sortVal === 'salary_asc') filtered.sort((a, b) => (a.salary_min || 999999) - (b.salary_min || 999999));

    totalResults = data.count || 0;
    totalPages   = Math.min(Math.ceil(totalResults / PER_PAGE), 20);

    if (filtered.length === 0) {
      container.innerHTML = `<div class="empty-state"><p>No careers found.</p><small>Try different keywords or location.</small></div>`;
      meta.style.display = 'none';
      document.getElementById('pagination').style.display = 'none';
      return;
    }

    meta.style.display = 'block';
    countEl.innerHTML  = `<strong>${totalResults.toLocaleString()}</strong> jobs found &mdash; page ${page} of ${totalPages}`;
    container.innerHTML = '';
    const grid = document.createElement('div');
    grid.className = 'jobs-grid';
    filtered.forEach((job, i) => grid.appendChild(buildCard(job, i)));
    container.appendChild(grid);
    renderPagination(page);
  }

  function buildCard(job, delay) {
    const card = document.createElement('div');
    card.className = 'job-card';
    card.style.animationDelay = `${delay * 40}ms`;

    const company  = job.company?.display_name || 'Unknown Company';
    const location = job.location?.display_name || 'Location not listed';
    const state    = job.location?.area?.[1] || '';
    const isRemote = location.toLowerCase().includes('remote') || (job.title||'').toLowerCase().includes('remote');
    const daysAgo  = job.created ? Math.floor((Date.now() - new Date(job.created)) / 86400000) : null;
    const isNew    = daysAgo !== null && daysAgo <= 3;
    const descFull = (job.description || 'No description available.').replace(/<[^>]*>/g,'');
    const descId   = 'desc_' + (job.id || Math.random().toString(36).slice(2));
    const applyUrl = job.redirect_url || '#';
    const salary   = job.salary_min && job.salary_max
      ? `$${Math.round(job.salary_min/1000)}k–$${Math.round(job.salary_max/1000)}k` : null;

    const initial  = company[0]?.toUpperCase() || '?';
    const bgColors = ['#3B82F6','#10B981','#F59E0B','#EF4444','#8B5CF6','#EC4899','#06B6D4','#F97316'];
    const bgColor  = bgColors[company.charCodeAt(0) % bgColors.length];
    const logoDiv  = document.createElement('div');
    logoDiv.className = 'job-logo';
    logoDiv.style.cssText = `background:${bgColor};color:#fff;font-size:18px;font-weight:700;font-family:'Fraunces',serif;`;
    logoDiv.textContent = initial;

    // Brandfetch logo
    const domain = company.toLowerCase()
      .replace(/,?\s*(inc|llc|ltd|corp|co|group|services|international|holdings|solutions)\.?$/i, '')
      .replace(/[^a-z0-9]+/g, '').trim() + '.com';
    fetch(`${WORKER_URL}/?action=logo&domain=${domain}`)
      .then(r => r.json())
      .then(data => {
        if (!data.hasLogo || !data.url) return;
        const img = document.createElement('img');
        img.style.cssText = 'width:100%;height:100%;object-fit:contain;border-radius:8px;display:block;';
        img.alt = company;
        img.addEventListener('load', () => {
          logoDiv.innerHTML = '';
          logoDiv.style.background = '#fff';
          logoDiv.style.padding = '4px';
          logoDiv.style.border = '1px solid #D5DAE0';
          logoDiv.appendChild(img);
        });
        img.addEventListener('error', () => {});
        img.src = data.url;
      }).catch(() => {});

    const body = document.createElement('div');
    body.className = 'job-body';
    body.innerHTML = `
      <div class="job-title">${esc(job.title || 'Position')}</div>
      <div class="job-company">${esc(company)} &middot; ${esc(location)}${state ? ' &middot; ' + esc(state) : ''}</div>
      <div class="job-tags">
        ${isRemote ? '<span class="tag remote">Remote</span>' : ''}
        ${isNew    ? '<span class="tag new">✨ New</span>' : ''}
        ${salary   ? `<span class="tag salary">💰 ${esc(salary)}</span>` : ''}
        ${job.contract_time ? `<span class="tag default">${esc(job.contract_time.replace('_',' '))}</span>` : ''}
        ${salary ? `<span class="tag glassdoor" title="Glassdoor est.">GD: ${(3.2 + (company.charCodeAt(0) % 18) / 10).toFixed(1)} ★</span>` : ''}
      </div>
      <div class="job-desc" id="${descId}">${esc(descFull)}</div>
      ${descFull.length > 200 ? `<button class="btn-expand" onclick="toggleDesc('${descId}', this)">Show more ▼</button>` : ''}`;

    const isSaved = !!savedJobs[job.id];
    jobCache[job.id] = job;

    const actions = document.createElement('div');
    actions.className = 'job-actions';
    actions.innerHTML = `
      <span class="job-posted">${daysAgo === 0 ? 'Today' : daysAgo != null ? `${daysAgo}d ago` : ''}</span>
      <button class="btn-bookmark${isSaved ? ' saved' : ''}" data-jobid="${job.id}" onclick="toggleSave('${job.id}')">
        ${isSaved ? '★' : '☆'}
      </button>
      <a class="btn-apply" href="${applyUrl}" target="_blank" rel="noopener">Apply &rarr;</a>`;

    card.appendChild(logoDiv);
    card.appendChild(body);
    card.appendChild(actions);
    return card;
  }



  function renderPagination(current) {
    const pg = document.getElementById('pagination');
    if (totalPages <= 1) { pg.style.display = 'none'; return; }
    pg.style.display = 'flex';
    pg.innerHTML = '';
    const prev = Object.assign(document.createElement('button'), { className:'btn-page', textContent:'← Prev', disabled: current === 1 });
    prev.onclick = () => runSearch(current - 1);
    pg.appendChild(prev);
    let start = Math.max(1, current - 2), end = Math.min(totalPages, start + 4);
    if (end - start < 4) start = Math.max(1, end - 4);
    for (let p = start; p <= end; p++) {
      const btn = Object.assign(document.createElement('button'), { className: 'btn-page' + (p === current ? ' active' : ''), textContent: p });
      const pp = p; btn.onclick = () => runSearch(pp);
      pg.appendChild(btn);
    }
    const next = Object.assign(document.createElement('button'), { className:'btn-page', textContent:'Next →', disabled: current === totalPages });
    next.onclick = () => runSearch(current + 1);
    pg.appendChild(next);
  }

  function showLoading() {
    document.getElementById('jobsContainer').innerHTML = `<div class="loading-state"><div class="spinner"></div><div class="loading-text">Searching careers…</div></div>`;
    document.getElementById('resultsMeta').style.display = 'none';
    document.getElementById('pagination').style.display  = 'none';
  }

  function showError(msg) {
    document.getElementById('jobsContainer').innerHTML = `<div class="empty-state"><p>Something went wrong.</p><small>${esc(msg)}</small></div>`;
  }

  function toggleDesc(id, btn) {
    const el = document.getElementById(id);
    if (!el) return;
    const isExpanded = el.classList.toggle('expanded');
    btn.textContent = isExpanded ? 'Show less ▲' : 'Show more ▼';
  }

  function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  ['keywordInput','locationInput'].forEach(id =>
    document.getElementById(id).addEventListener('keydown', e => { if (e.key === 'Enter') runSearch(); })
  );

  window.addEventListener('DOMContentLoaded', () => {
    updateSavedCount();
    runSearch();
  });
</script>
</body>
</html>
